```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zombie Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #020617;
    touch-action: none;
  }

  canvas { display: block; }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
  }

  #joystick {
    position: fixed;
    bottom: 40px;
    left: 40px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  #stick {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    position: absolute;
    left: 30px;
    top: 30px;
  }
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Gun: <span id="gun">1</span>
</div>

<div id="joystick">
  <div id="stick"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== PLAYER =====
let player = {
  x: canvas.width/2,
  y: canvas.height/2,
  hp: 100,
  gun: 1
};

// ===== JOYSTICK =====
let joy = { x: 0, y: 0 };
let active = false;

const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

joystick.addEventListener("touchstart", e => {
  active = true;
});

joystick.addEventListener("touchmove", e => {
  let t = e.touches[0];
  let rect = joystick.getBoundingClientRect();

  let x = t.clientX - rect.left - 50;
  let y = t.clientY - rect.top - 50;

  let dist = Math.hypot(x, y);
  if (dist > 40) {
    x *= 40/dist;
    y *= 40/dist;
  }

  joy.x = x / 40;
  joy.y = y / 40;

  stick.style.left = (x + 50 - 20) + "px";
  stick.style.top = (y + 50 - 20) + "px";
});

joystick.addEventListener("touchend", () => {
  active = false;
  joy.x = joy.y = 0;
  stick.style.left = "30px";
  stick.style.top = "30px";
});

// ===== GAME =====
let bullets = [];
let zombies = [];

function spawnZombie() {
  zombies.push({
    x: Math.random()*canvas.width,
    y: -20,
    hp: 30
  });
}
setInterval(spawnZombie, 1000);

// AUTO SHOOT
function shoot() {
  if (zombies.length === 0) return;

  let target = zombies[0];
  let angle = Math.atan2(target.y - player.y, target.x - player.x);

  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle)*6,
    vy: Math.sin(angle)*6
  });
}
setInterval(shoot, 400);

// UPDATE
function update() {
  player.x += joy.x * 4;
  player.y += joy.y * 4;

  bullets.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
  });

  zombies.forEach(z => {
    let dx = player.x - z.x;
    let dy = player.y - z.y;
    let d = Math.hypot(dx,dy);

    z.x += dx/d;
    z.y += dy/d;

    if (d < 20) player.hp -= 0.2;
  });

  bullets.forEach((b,bi)=>{
    zombies.forEach((z,zi)=>{
      if (Math.hypot(b.x-z.x,b.y-z.y)<15){
        z.hp -= 10;
        bullets.splice(bi,1);
      }
    });
  });

  zombies.forEach((z,i)=>{
    if(z.hp<=0) zombies.splice(i,1);
  });

  document.getElementById("hp").innerText = Math.floor(player.hp);
}

// DRAW
function draw() {
  ctx.fillStyle="#020617";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="green";
  ctx.beginPath();
  ctx.arc(player.x,player.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="yellow";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="red";
  zombies.forEach(z=>{
    ctx.beginPath();
    ctx.arc(z.x,z.y,12,0,Math.PI*2);
    ctx.fill();
  });
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
